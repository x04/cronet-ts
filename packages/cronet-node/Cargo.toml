[package]
name = "cronet-node"
version = "0.1.0"
edition = "2021"
description = "Node.js native addon for Cronet via napi-rs"

[lib]
crate-type = ["cdylib"]

[dependencies]
cronet = { path = "../cronet" }
cronet-sys = { path = "../cronet-sys" }
napi = { version = "2", features = ["async", "napi8", "serde-json"] }
napi-derive = "2"
tokio = { version = "1", features = ["rt-multi-thread", "sync", "macros"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
bytes = "1"
once_cell = "1"

[build-dependencies]
napi-build = "2"
